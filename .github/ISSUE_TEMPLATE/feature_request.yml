name: Feature request
description: Suggest an improvement to the blog/site.
labels: ["enhancement", "backlog"]
body:
  - type: markdown
    attributes:
      value: |
        This repo is **content-first**. We keep improvements small and majority-value.

        - If your request is accessibility-specific or niche, it will likely be closed.
        - If it is mostly preference, branding, or style taste, it will likely be closed.
        - Please keep requests concrete and minimal.

  - type: checkboxes
    id: rules
    attributes:
      label: Before you submit
      options:
        - label: I read POSTING_RULES.md and CONTRIBUTING.md, and this issue fits the repo scope.
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve for most readers?
      placeholder: I can’t find posts / navigation is unclear / etc
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Minimal change that solves the problem.
      placeholder: Add X link in header / Add RSS / etc.
    validations:
      required: true

  - type: textarea
    id: why-now
    attributes:
      label: Why is this worth doing now?
      description: Explain why this should beat other content/process work.
      placeholder: Concrete majority-reader value, not just personal preference.
    validations:
      required: true

  - type: dropdown
    id: majority
    attributes:
      label: Majority-value?
      description: Does this benefit the majority of readers?
      options:
        - Yes
        - Not sure
        - Probably not
    validations:
      required: true

  - type: dropdown
    id: preference
    attributes:
      label: Is this mostly a personal preference, branding idea, or style taste request?
      options:
        - No
        - Partly / not sure
        - Yes
    validations:
      required: true
