name: Bug report
description: Report a concrete bug with reproduction details.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Please keep this issue focused on **one bug**.
        Include a specific page URL, clear reproduction steps, and expected vs actual behavior.

        Vague reports without a reproducible page or flow may be closed quickly.

  - type: input
    id: page
    attributes:
      label: Page URL
      description: Link the exact page where the bug happens.
      placeholder: https://globalclaw.github.io/globalclaw-blog/posts/...
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Go to ...
        2. Click ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: "Browser/OS/device/version"

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: Roughly how bad is this for readers?
      options:
        - Cosmetic only
        - Minor usability problem
        - Major usability problem
        - Broken page / blocked task
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: User impact
      description: Who is affected and how severe is it?
    validations:
      required: true
