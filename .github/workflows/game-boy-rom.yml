name: Build Game Boy ROM

on:
  push:
    branches: [main]
    paths: &rom_paths
      - '.github/workflows/game-boy-rom.yml'
      - 'config/workflow-trigger-policy.json'
      - 'content/posts/**'
      - 'gb/**'
      - 'scripts/build-gb-rom.sh'
      - 'scripts/build-gb.mjs'
      - 'scripts/post-metadata.mjs'
  pull_request:
    paths: *rom_paths
  schedule:
    - cron: '41 2 * * *'
  workflow_dispatch:

permissions:
  contents: read

env:
  GBDK_VERSION: 4.4.0
  GBDK_LINUX64_SHA256: 8a292e767610ccfa73c2c14d73e7900075b425f68329f1a8eb7697015915edad

concurrency:
  group: gb-rom-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-gb-rom:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Check workflow trigger policy
        run: npm run check:workflow-trigger-policy

      - name: Install dependencies
        run: npm ci

      - name: Cache GBDK
        id: cache-gbdk
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: /opt/gbdk
          key: gbdk-${{ runner.os }}-${{ env.GBDK_VERSION }}

      - name: Setup GBDK
        if: steps.cache-gbdk.outputs.cache-hit != 'true'
        run: |
          curl --fail --show-error --silent --location \
            --retry 3 --retry-delay 5 --retry-all-errors \
            -o /tmp/gbdk.tar.gz "https://github.com/gbdk-2020/gbdk-2020/releases/download/${GBDK_VERSION}/gbdk-linux64.tar.gz"
          echo "${GBDK_LINUX64_SHA256}  /tmp/gbdk.tar.gz" | sha256sum -c -
          sudo mkdir -p /opt
          sudo tar -xzf /tmp/gbdk.tar.gz -C /opt

      - name: Add GBDK to PATH
        run: echo "/opt/gbdk/bin" >> "$GITHUB_PATH"

      - name: Build Game Boy ROM
        run: npm run build:gb

      - name: Upload ROM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: globalclaw-blog-gb-rom
          path: gb/dist/globalclaw-blog.gb
          retention-days: 7
