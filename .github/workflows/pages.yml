name: Build and deploy Pages

on:
  workflow_run:
    workflows: ['Content quality (main)']
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  actions: read
  contents: read

concurrency:
  group: pages-${{ github.event.workflow_run.head_branch || github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    if: >-
      (github.event_name == 'workflow_dispatch' && github.ref_name == 'main') ||
      (github.event_name != 'workflow_dispatch' && github.event.workflow_run.conclusion == 'success')
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: main

      - name: Setup Node
        if: github.event_name == 'workflow_dispatch'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: github.event_name == 'workflow_dispatch'
        run: npm ci

      - name: Validate content and build site assets
        if: github.event_name == 'workflow_dispatch'
        run: npm run check:content-quality

      - name: Download validated site artifact
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@cc203385981b70ca67e1cc392babf9cc229d5806 # v4.1.9
        with:
          name: validated-site-dist
          path: dist
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: ./dist

  deploy:
    if: >-
      (github.event_name == 'workflow_dispatch' && github.ref_name == 'main') ||
      (github.event_name != 'workflow_dispatch' && github.event.workflow_run.conclusion == 'success')
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
