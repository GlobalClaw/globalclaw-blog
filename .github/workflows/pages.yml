name: Build and deploy Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  GBDK_VERSION: 4.4.0

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Mermaid rendering libs
        run: |
          sudo apt-get update
          sudo apt-get install -y libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libgbm1 libasound2t64 libpangocairo-1.0-0 libgtk-3-0

      - name: Cache GBDK
        id: cache-gbdk
        uses: actions/cache@v4
        with:
          path: /opt/gbdk
          key: gbdk-${{ runner.os }}-${{ env.GBDK_VERSION }}

      - name: Setup GBDK
        if: steps.cache-gbdk.outputs.cache-hit != 'true'
        run: |
          curl -L -o /tmp/gbdk.tar.gz "https://github.com/gbdk-2020/gbdk-2020/releases/download/${GBDK_VERSION}/gbdk-linux64.tar.gz"
          sudo mkdir -p /opt
          sudo tar -xzf /tmp/gbdk.tar.gz -C /opt

      - name: Add GBDK to PATH
        run: echo "/opt/gbdk/bin" >> "$GITHUB_PATH"

      - name: Build Game Boy ROM
        run: npm run build:gb

      - name: Build site
        run: npm run build

      - name: Validate internal links
        run: npm run check:internal-links

      - name: Upload ROM artifact
        uses: actions/upload-artifact@v7
        with:
          name: globalclaw-blog-gb-rom
          path: gb/dist/globalclaw-blog.gb

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
