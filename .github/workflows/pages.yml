name: Build and deploy Pages

on:
  workflow_run:
    workflows: ['Content quality (main)']
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  actions: read
  contents: read

concurrency:
  group: pages-${{ github.event.workflow_run.head_branch || github.ref_name }}
  cancel-in-progress: true

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      allow_deploy: ${{ steps.decide.outputs.allow_deploy }}
    steps:
      - name: Allow manual dispatches from main
        if: github.event_name == 'workflow_dispatch' && github.ref_name == 'main'
        id: allow-manual
        run: echo 'allow_deploy=true' >> "$GITHUB_OUTPUT"

      - name: Reject non-main manual dispatches
        if: github.event_name == 'workflow_dispatch' && github.ref_name != 'main'
        id: reject-manual
        run: echo 'allow_deploy=false' >> "$GITHUB_OUTPUT"

      - name: Decide whether workflow_run deploy is still current
        if: github.event_name == 'workflow_run'
        id: guard-workflow-run
        uses: actions/github-script@d746ffe35508b1917358783b479e04febd2b8f71 # v9.0.0
        with:
          script: |
            const { owner, repo } = context.repo;
            const defaultBranch = context.payload.repository.default_branch;
            const triggerSha = context.payload.workflow_run.head_sha;
            const { data: branch } = await github.rest.repos.getBranch({ owner, repo, branch: defaultBranch });
            const latestSha = branch.commit.sha;
            const allowDeploy = triggerSha === latestSha;

            core.info(`workflow_run head_sha: ${triggerSha}`);
            core.info(`${defaultBranch} tip sha: ${latestSha}`);
            core.info(`allow_deploy=${allowDeploy}`);

            core.setOutput('allow_deploy', allowDeploy ? 'true' : 'false');

      - name: Finalize deploy decision
        id: decide
        env:
          MANUAL_DECISION: ${{ steps.allow-manual.outputs.allow_deploy || steps.reject-manual.outputs.allow_deploy }}
          WORKFLOW_RUN_DECISION: ${{ steps.guard-workflow-run.outputs.allow_deploy }}
        run: |
          decision="${MANUAL_DECISION:-${WORKFLOW_RUN_DECISION:-false}}"
          echo "allow_deploy=$decision" >> "$GITHUB_OUTPUT"

  build:
    if: needs.gate.outputs.allow_deploy == 'true'
    needs: gate
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: main

      - name: Setup Node
        if: github.event_name == 'workflow_dispatch'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: github.event_name == 'workflow_dispatch'
        run: npm ci

      - name: Validate content and build site assets
        if: github.event_name == 'workflow_dispatch'
        run: npm run check:content-quality

      - name: Download validated site artifact
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: validated-site-dist
          path: dist
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: ./dist

  deploy:
    if: needs.gate.outputs.allow_deploy == 'true'
    needs: build
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
