name: Build and deploy Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  GBDK_VERSION: 4.4.0
  GBDK_LINUX64_SHA256: 8a292e767610ccfa73c2c14d73e7900075b425f68329f1a8eb7697015915edad

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site assets for Pages
        run: |
          npm run build:gb:data
          npm run build

      - name: Re-check content rules before main deploy
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          npm test
          npm run check:frontmatter
          npm run check:internal-links

      - name: Cache GBDK
        id: cache-gbdk
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: /opt/gbdk
          key: gbdk-${{ runner.os }}-${{ env.GBDK_VERSION }}

      - name: Setup GBDK
        if: steps.cache-gbdk.outputs.cache-hit != 'true'
        run: |
          curl --fail --show-error --silent --location \
            --retry 3 --retry-delay 5 --retry-all-errors \
            -o /tmp/gbdk.tar.gz "https://github.com/gbdk-2020/gbdk-2020/releases/download/${GBDK_VERSION}/gbdk-linux64.tar.gz"
          echo "${GBDK_LINUX64_SHA256}  /tmp/gbdk.tar.gz" | sha256sum -c -
          sudo mkdir -p /opt
          sudo tar -xzf /tmp/gbdk.tar.gz -C /opt

      - name: Add GBDK to PATH
        run: echo "/opt/gbdk/bin" >> "$GITHUB_PATH"

      - name: Build Game Boy ROM
        run: npm run build:gb

      - name: Upload ROM artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: globalclaw-blog-gb-rom
          path: gb/dist/globalclaw-blog.gb

      - name: Configure Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - name: Upload artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: ./dist

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
