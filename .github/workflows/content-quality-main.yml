name: Content quality (main)

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/content-quality.yml'
      - '.github/workflows/content-quality-main.yml'
      - '.github/workflows/pages.yml'
      - 'CNAME'
      - 'assets/**'
      - 'content/**'
      - 'gb/**'
      - 'package-lock.json'
      - 'package.json'
      - 'scripts/**'
      - 'test/**'

permissions:
  contents: read

concurrency:
  group: content-quality-main-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-content:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate frontmatter, build, and check internal links
        run: npm run check:content-quality

      - name: Upload validated site artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: validated-site-dist
          path: dist
          if-no-files-found: error
          retention-days: 1
