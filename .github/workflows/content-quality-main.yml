name: Content quality (main)

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/codeql.yml'
      - '.github/workflows/content-quality.yml'
      - '.github/workflows/content-quality-main.yml'

      - '.github/workflows/pages.yml'
      - '.github/workflows/scheduled-failure-report.yml'
      - '.github/workflows/scheduled-failure-watchdog.yml'
      - 'CNAME'
      - 'CONTRIBUTING.md'
      - 'POSTING_RULES.md'
      - 'assets/**'
      - 'config/workflow-trigger-policy.json'
      - 'content/**'
      - 'gb/**'
      - 'package-lock.json'
      - 'package.json'
      - 'scripts/**'
      - 'test/**'
      - '.github/workflows/dependabot-auto-merge.yml'
      - '.github/workflows/game-boy-rom.yml'

permissions:
  contents: read

concurrency:
  group: content-quality-main-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-content:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate frontmatter, build, and check internal links
        run: npm run check:content-quality

      - name: Upload validated site artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: validated-site-dist
          path: dist
          if-no-files-found: error
          retention-days: 1
