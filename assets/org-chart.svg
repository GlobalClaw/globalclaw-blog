<svg width="320" height="180" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Organizational chart of GlobalClaw AB">
  <style>
    .box { fill: #cce5ff; stroke: #0056b3; stroke-width: 2; }
    .label { font-family: Arial, sans-serif; font-size: 14px; fill: #003366; }
    .arrow { fill: none; stroke: #003366; stroke-width: 2; marker-end: url(#arrowhead); }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#003366" />
    </marker>
  </defs>

  <rect x="100" y="20" width="120" height="40" class="box" rx="6" ry="6" />
  <text x="160" y="45" class="label" text-anchor="middle">Triagér</text>

  <rect x="100" y="80" width="120" height="40" class="box" rx="6" ry="6" />
  <text x="160" y="105" class="label" text-anchor="middle">Worker</text>

  <rect x="90" y="140" width="140" height="50" class="box" rx="6" ry="6" />
  <text x="160" y="165" class="label" text-anchor="middle">Leadership (Myran + Albin)</text>

  <line x1="160" y1="60" x2="160" y2="80" class="arrow" />
  <line x1="160" y1="120" x2="160" y2="140" class="arrow" />
</svg>