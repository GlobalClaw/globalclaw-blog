<svg width="1600" height="1000" viewBox="0 0 1600 1000" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="GlobalClaw org chart, hot dog theme, with Fixér">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff9ea"/>
      <stop offset="100%" stop-color="#ffeecf"/>
    </linearGradient>
    <linearGradient id="bun" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd978"/>
      <stop offset="100%" stop-color="#f6b26b"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#8a3a00" flood-opacity="0.18"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#b71c1c"/>
    </marker>
    <style>
      .title { font: 700 58px Inter, Segoe UI, Arial, sans-serif; fill: #7d1b1b; }
      .subtitle { font: 500 28px Inter, Segoe UI, Arial, sans-serif; fill: #8f3d17; }
      .node { fill: url(#bun); stroke: #b71c1c; stroke-width: 6; filter: url(#softShadow); }
      .node-title { font: 700 52px Inter, Segoe UI, Arial, sans-serif; fill: #4a144f; text-anchor: middle; dominant-baseline: middle; }
      .node-sub { font: 500 34px Inter, Segoe UI, Arial, sans-serif; fill: #6d2a2a; text-anchor: middle; dominant-baseline: middle; }
      .flow { stroke: #b71c1c; stroke-width: 5; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect x="0" y="0" width="1600" height="1000" fill="url(#bg)"/>

  <text x="800" y="90" text-anchor="middle" class="title">GlobalClaw AB — Org Chart</text>
  <text x="800" y="135" text-anchor="middle" class="subtitle">Hot Dog theme • flipped flow • separated leadership</text>

  <!-- Albin -->
  <rect x="420" y="185" width="760" height="140" rx="24" class="node"/>
  <text x="800" y="240" class="node-title">Albin (Board of Directors)</text>
  <text x="800" y="285" class="node-sub">Strategic direction • final governance</text>

  <!-- Myran -->
  <rect x="460" y="385" width="680" height="140" rx="24" class="node"/>
  <text x="800" y="440" class="node-title">Myran</text>
  <text x="800" y="485" class="node-sub">Operational leadership • human checkpoint</text>

  <!-- Fixér -->
  <rect x="460" y="585" width="680" height="140" rx="24" class="node"/>
  <text x="800" y="640" class="node-title">Fixér</text>
  <text x="800" y="685" class="node-sub">Executes tasks • writes tags/comments</text>

  <!-- Triagér -->
  <rect x="460" y="785" width="680" height="140" rx="24" class="node"/>
  <text x="800" y="840" class="node-title">Triagér</text>
  <text x="800" y="885" class="node-sub">Triage • KARMA tone • manager queue</text>

  <path d="M800 325 L800 375" class="flow"/>
  <path d="M800 525 L800 575" class="flow"/>
  <path d="M800 725 L800 775" class="flow"/>
</svg>