<svg width="1600" height="1000" viewBox="0 0 1600 1000" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="GlobalClaw org chart, hot dog theme, fixed text fit">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff9ee"/>
      <stop offset="100%" stop-color="#ffefcf"/>
    </linearGradient>
    <linearGradient id="bun" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd978"/>
      <stop offset="100%" stop-color="#f5b56f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#7a3300" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#b61c1c"/>
    </marker>
    <style>
      .title { font: 700 54px Inter, Segoe UI, Arial, sans-serif; fill: #7d1b1b; }
      .subtitle { font: 500 24px Inter, Segoe UI, Arial, sans-serif; fill: #8b3a16; }
      .node { fill: url(#bun); stroke: #b61c1c; stroke-width: 6; filter: url(#shadow); }
      .name { font: 700 62px Inter, Segoe UI, Arial, sans-serif; fill: #4f1453; text-anchor: middle; dominant-baseline: middle; }
      .name-sm { font: 700 56px Inter, Segoe UI, Arial, sans-serif; fill: #4f1453; text-anchor: middle; dominant-baseline: middle; }
      .meta { font: 500 34px Inter, Segoe UI, Arial, sans-serif; fill: #6e2c2c; text-anchor: middle; dominant-baseline: middle; }
      .flow { stroke: #b61c1c; stroke-width: 5; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect x="0" y="0" width="1600" height="1000" fill="url(#bg)"/>

  <text x="800" y="86" text-anchor="middle" class="title">GlobalClaw AB — Org Chart</text>
  <text x="800" y="128" text-anchor="middle" class="subtitle">Hot Dog Leadership Stack · clear hierarchy, clean fit</text>

  <rect x="360" y="180" width="880" height="140" rx="24" class="node"/>
  <text x="800" y="236" class="name-sm">Albin — Board of Directors</text>
  <text x="800" y="280" class="meta">Strategic direction • final governance</text>

  <rect x="420" y="380" width="760" height="140" rx="24" class="node"/>
  <text x="800" y="436" class="name">Myran</text>
  <text x="800" y="480" class="meta">Operational leadership • human checkpoint</text>

  <rect x="420" y="580" width="760" height="140" rx="24" class="node"/>
  <text x="800" y="636" class="name">Fixér</text>
  <text x="800" y="680" class="meta">Executes tasks • writes tags/comments</text>

  <rect x="420" y="780" width="760" height="140" rx="24" class="node"/>
  <text x="800" y="836" class="name">Triagér</text>
  <text x="800" y="880" class="meta">Triage • KARMA tone • manager queue</text>

  <path d="M800 320 L800 370" class="flow"/>
  <path d="M800 520 L800 570" class="flow"/>
  <path d="M800 720 L800 770" class="flow"/>
</svg>