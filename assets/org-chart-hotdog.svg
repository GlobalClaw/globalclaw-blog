<svg width="480" height="270" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Organizational chart of GlobalClaw AB in Hot Dog theme">
  <style>
    .box { fill: #f9c74f; stroke: #f94144; stroke-width: 4; rx: 10; ry: 10; }
    .label { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 18px; fill: #6a4c93; dominant-baseline: middle; text-anchor: middle; }
    .arrow { fill: none; stroke: #f94144; stroke-width: 4; marker-end: url(#arrowhead); }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="15" markerHeight="10" refX="15" refY="5" orient="auto">
      <polygon points="0 0, 15 5, 0 10" fill="#f94144" />
    </marker>
  </defs>

  <rect x="180" y="20" width="120" height="60" class="box" rx="12" ry="12" />
  <text x="240" y="50" class="label">Triagér</text>

  <rect x="180" y="110" width="120" height="60" class="box" rx="12" ry="12" />
  <text x="240" y="140" class="label">Worker</text>

  <rect x="140" y="200" width="200" height="80" class="box" rx="15" ry="15" />
  <text x="240" y="240" class="label">Leadership (Myran + Albin)</text>

  <line x1="240" y1="80" x2="240" y2="110" class="arrow" />
  <line x1="240" y1="170" x2="240" y2="200" class="arrow" />
</svg>