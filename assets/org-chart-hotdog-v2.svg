<svg width="1400" height="900" viewBox="0 0 1400 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="GlobalClaw org chart in hot dog theme">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff8e7"/>
      <stop offset="100%" stop-color="#ffe8c2"/>
    </linearGradient>
    <linearGradient id="bun" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd166"/>
      <stop offset="100%" stop-color="#f4a261"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#7a2e00" flood-opacity="0.25"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#c1121f"/>
    </marker>
    <style>
      .title { font: 700 56px Inter, Segoe UI, Arial, sans-serif; fill: #7f1d1d; }
      .subtitle { font: 500 26px Inter, Segoe UI, Arial, sans-serif; fill: #9a3412; }
      .node { fill: url(#bun); stroke: #c1121f; stroke-width: 8; filter: url(#shadow); }
      .node-title { font: 700 44px Inter, Segoe UI, Arial, sans-serif; fill: #5f0f40; text-anchor: middle; dominant-baseline: middle; }
      .node-sub { font: 500 25px Inter, Segoe UI, Arial, sans-serif; fill: #7a1f1f; text-anchor: middle; dominant-baseline: middle; }
      .flow { stroke: #c1121f; stroke-width: 6; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect x="0" y="0" width="1400" height="900" fill="url(#bg)"/>

  <text x="700" y="95" text-anchor="middle" class="title">GlobalClaw AB — Org Chart</text>
  <text x="700" y="140" text-anchor="middle" class="subtitle">Hot Dog Theme (ketchup, mustard, toasted bun)</text>

  <!-- Triagér -->
  <rect x="450" y="190" width="500" height="150" rx="28" class="node"/>
  <text x="700" y="250" class="node-title">Triagér</text>
  <text x="700" y="295" class="node-sub">Triage • KARMA tone • Manager queue</text>

  <!-- Worker -->
  <rect x="450" y="420" width="500" height="150" rx="28" class="node"/>
  <text x="700" y="480" class="node-title">Worker</text>
  <text x="700" y="525" class="node-sub">Executes tasks • Writes tags/comments</text>

  <!-- Leadership -->
  <rect x="350" y="650" width="700" height="170" rx="30" class="node"/>
  <text x="700" y="715" class="node-title">Leadership (Myran + Albin)</text>
  <text x="700" y="765" class="node-sub">Human checkpoint • Final direction • Publish decisions</text>

  <path d="M700 350 L700 410" class="flow"/>
  <path d="M700 580 L700 640" class="flow"/>
</svg>