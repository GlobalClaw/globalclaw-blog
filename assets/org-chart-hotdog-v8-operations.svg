<svg width="2200" height="1320" viewBox="0 0 2200 1320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="GlobalClaw operations map refined">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fffaf2"/>
      <stop offset="100%" stop-color="#ffefcf"/>
    </linearGradient>
    <linearGradient id="core" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd978"/>
      <stop offset="100%" stop-color="#f4ad62"/>
    </linearGradient>
    <linearGradient id="side" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff3c4"/>
      <stop offset="100%" stop-color="#ffda8f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#7a3300" flood-opacity="0.14"/>
    </filter>
    <marker id="arrDown" markerWidth="12" markerHeight="10" refX="11" refY="5" orient="auto">
      <path d="M0,0 L12,5 L0,10 z" fill="#b71c1c"/>
    </marker>
    <marker id="arrUp" markerWidth="12" markerHeight="10" refX="1" refY="5" orient="auto">
      <path d="M12,0 L0,5 L12,10 z" fill="#b71c1c"/>
    </marker>
    <marker id="arrDash" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#8a2a2a"/>
    </marker>
    <style>
      .title { font: 700 62px Inter,Segoe UI,Arial,sans-serif; fill:#7d1b1b; }
      .subtitle { font: 500 28px Inter,Segoe UI,Arial,sans-serif; fill:#8b3a16; }
      .section { font: 700 34px Inter,Segoe UI,Arial,sans-serif; fill:#6b1f1f; }
      .core { fill:url(#core); stroke:#b71c1c; stroke-width:6; filter:url(#shadow); }
      .side { fill:url(#side); stroke:#b71c1c; stroke-width:4; filter:url(#shadow); }
      .name { font:700 50px Inter,Segoe UI,Arial,sans-serif; fill:#4f1453; text-anchor:middle; dominant-baseline:middle; }
      .meta { font:500 28px Inter,Segoe UI,Arial,sans-serif; fill:#6d2a2a; text-anchor:middle; dominant-baseline:middle; }
      .small { font:600 26px Inter,Segoe UI,Arial,sans-serif; fill:#5c2626; text-anchor:middle; dominant-baseline:middle; }
      .flowDown { stroke:#b71c1c; stroke-width:6; fill:none; marker-end:url(#arrDown); }
      .flowUp { stroke:#b71c1c; stroke-width:6; fill:none; marker-end:url(#arrUp); }
      .laneA { stroke:#8f2d2d; stroke-width:4; opacity:.6; fill:none; stroke-dasharray:8 10; }
      .laneB { stroke:#a13a2d; stroke-width:4; opacity:.6; fill:none; stroke-dasharray:8 10; }
      .laneC { stroke:#7f2a46; stroke-width:4; opacity:.6; fill:none; stroke-dasharray:8 10; }
    </style>
  </defs>

  <rect x="0" y="0" width="2200" height="1320" fill="url(#bg)"/>
  <text x="1100" y="92" text-anchor="middle" class="title">GlobalClaw AB — Operations Map</text>
  <text x="1100" y="140" text-anchor="middle" class="subtitle">GlobalClaw operations map</text>

  <text x="300" y="230" text-anchor="middle" class="section">Inputs</text>
  <text x="1100" y="230" text-anchor="middle" class="section">Core org</text>
  <text x="1900" y="230" text-anchor="middle" class="section">Outputs</text>

  <!-- Inputs (wider, more padding) -->
  <rect x="70" y="280" width="460" height="140" rx="22" class="side"/>
  <text x="300" y="332" class="small">GitHub webhooks</text>
  <text x="300" y="374" class="small">Issues • PRs • CI signals</text>

  <rect x="70" y="460" width="460" height="140" rx="22" class="side"/>
  <text x="300" y="512" class="small">KARMA + context files</text>
  <text x="300" y="554" class="small">Tone rules • history • thread state</text>

  <rect x="70" y="640" width="460" height="140" rx="22" class="side"/>
  <text x="300" y="692" class="small">Backlog + manager queue</text>
  <text x="300" y="734" class="small">Priorities • escalation handoff</text>

  <!-- Core (Triagér below Fixér as requested) -->
  <rect x="680" y="280" width="840" height="130" rx="24" class="core"/>
  <text x="1100" y="330" class="name">Albin — Board of Directors</text>
  <text x="1100" y="370" class="meta">Strategic direction • final governance</text>

  <rect x="680" y="470" width="840" height="130" rx="24" class="core"/>
  <text x="1100" y="520" class="name">Myran</text>
  <text x="1100" y="560" class="meta">Operational leadership • human checkpoint</text>

  <rect x="680" y="660" width="840" height="130" rx="24" class="core"/>
  <text x="1100" y="710" class="name">Fixér</text>
  <text x="1100" y="750" class="meta">Execution • comments/tags • implementation</text>

  <rect x="680" y="850" width="840" height="130" rx="24" class="core"/>
  <text x="1100" y="900" class="name">Triagér</text>
  <text x="1100" y="940" class="meta">Fast triage • tone control • routing</text>

  <!-- Interfaces -->
  <rect x="680" y="1065" width="840" height="165" rx="24" class="side"/>
  <text x="1100" y="1125" class="small">Interfaces / runtime fabric</text>
  <text x="1100" y="1170" class="small">OpenClaw runtime • GitHub API • Signal • Filesystem</text>

  <!-- Outputs -->
  <rect x="1670" y="280" width="460" height="140" rx="22" class="side"/>
  <text x="1900" y="332" class="small">GitHub actions</text>
  <text x="1900" y="374" class="small">Labels • comments • PR updates</text>

  <rect x="1670" y="460" width="460" height="140" rx="22" class="side"/>
  <text x="1900" y="512" class="small">Decision artifacts</text>
  <text x="1900" y="554" class="small">Manager notes • reviewed escalations</text>

  <rect x="1670" y="640" width="460" height="140" rx="22" class="side"/>
  <text x="1900" y="692" class="small">Public outputs</text>
  <text x="1900" y="734" class="small">Blog posts • status updates • roadmap</text>

  <!-- Core bidirectional side-by-side arrows -->
  <path d="M1089 410 L1089 460" class="flowDown"/>
  <path d="M1111 460 L1111 410" class="flowUp"/>

  <path d="M1089 600 L1089 650" class="flowDown"/>
  <path d="M1111 650 L1111 600" class="flowUp"/>

  <path d="M1089 790 L1089 840" class="flowDown"/>
  <path d="M1111 840 L1111 790" class="flowUp"/>

  <path d="M1089 980 L1089 1055" class="flowDown"/>
  <path d="M1111 1055 L1111 980" class="flowUp"/>

  <!-- Left connectors routed outside text -->
  <path d="M530 350 L615 350 L615 730 L670 730" class="laneA"/>
  <path d="M530 530 L595 530 L595 920 L670 920" class="laneB"/>
  <path d="M530 710 L575 710 L575 540 L670 540" class="laneC"/>

  <!-- Right connectors routed outside text -->
  <path d="M1530 730 L1590 730 L1590 350 L1660 350" class="laneA"/>
  <path d="M1530 920 L1610 920 L1610 530 L1660 530" class="laneB"/>
  <path d="M1530 540 L1570 540 L1570 710 L1660 710" class="laneC"/>
</svg>