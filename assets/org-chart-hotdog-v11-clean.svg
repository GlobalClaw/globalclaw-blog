<svg width="2200" height="1320" viewBox="0 0 2200 1320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="GlobalClaw operations map clean v11">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fffaf3"/>
      <stop offset="100%" stop-color="#ffefcf"/>
    </linearGradient>
    <linearGradient id="core" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd978"/>
      <stop offset="100%" stop-color="#f4ad62"/>
    </linearGradient>
    <linearGradient id="side" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff3c4"/>
      <stop offset="100%" stop-color="#ffda8f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#7a3300" flood-opacity="0.14"/>
    </filter>
    <marker id="arr" markerUnits="userSpaceOnUse" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#b71c1c"/>
    </marker>
    <style>
      .title { font:700 58px Inter,Segoe UI,Arial,sans-serif; fill:#7d1b1b; }
      .subtitle { font:500 26px Inter,Segoe UI,Arial,sans-serif; fill:#8b3a16; }
      .section { font:700 32px Inter,Segoe UI,Arial,sans-serif; fill:#6b1f1f; }
      .core { fill:url(#core); stroke:#b71c1c; stroke-width:5; filter:url(#shadow); }
      .side { fill:url(#side); stroke:#b71c1c; stroke-width:4; filter:url(#shadow); }
      .name { font:700 44px Inter,Segoe UI,Arial,sans-serif; fill:#4f1453; text-anchor:middle; dominant-baseline:middle; }
      .meta { font:500 24px Inter,Segoe UI,Arial,sans-serif; fill:#6d2a2a; text-anchor:middle; dominant-baseline:middle; }
      .small { font:600 24px Inter,Segoe UI,Arial,sans-serif; fill:#5c2626; text-anchor:middle; dominant-baseline:middle; }
      .bi { stroke:#b71c1c; stroke-width:5; fill:none; marker-start:url(#arr); marker-end:url(#arr); }
      .link { stroke:#8a2a2a; stroke-width:4; fill:none; marker-start:url(#arr); marker-end:url(#arr); stroke-dasharray:8 9; }
    </style>
  </defs>

  <rect x="0" y="0" width="2200" height="1320" fill="url(#bg)"/>
  <text x="1100" y="88" text-anchor="middle" class="title">GlobalClaw AB — Operations Map</text>
  <text x="1100" y="132" text-anchor="middle" class="subtitle">Clean topology: external trigger + shared read/write state</text>

  <text x="320" y="220" text-anchor="middle" class="section">Shared state (read + write)</text>
  <text x="1100" y="220" text-anchor="middle" class="section">Core org</text>
  <text x="1880" y="220" text-anchor="middle" class="section">External surfaces</text>

  <!-- Left: shared state -->
  <rect x="80" y="270" width="480" height="130" rx="20" class="side"/>
  <text x="320" y="318" class="small">KARMA logs</text>
  <text x="320" y="358" class="small">Read tone history • Write outcomes</text>

  <rect x="80" y="450" width="480" height="130" rx="20" class="side"/>
  <text x="320" y="498" class="small">Backlog + manager queue</text>
  <text x="320" y="538" class="small">Read priorities • Write decisions</text>

  <rect x="80" y="630" width="480" height="130" rx="20" class="side"/>
  <text x="320" y="678" class="small">Context files / workspace</text>
  <text x="320" y="718" class="small">Read context • Write artifacts</text>

  <!-- Core -->
  <rect x="760" y="270" width="680" height="120" rx="22" class="core"/>
  <text x="1100" y="314" class="name">Albin — Board of Directors</text>
  <text x="1100" y="350" class="meta">Strategic direction • final governance</text>

  <rect x="760" y="440" width="680" height="120" rx="22" class="core"/>
  <text x="1100" y="484" class="name">Myran</text>
  <text x="1100" y="520" class="meta">Operational leadership • human checkpoint</text>

  <!-- Peer layer -->
  <rect x="650" y="670" width="440" height="120" rx="22" class="core"/>
  <text x="870" y="714" class="name">Fixér</text>
  <text x="870" y="750" class="meta">Execution • shipping</text>

  <rect x="1110" y="670" width="440" height="120" rx="22" class="core"/>
  <text x="1330" y="714" class="name">Triagér</text>
  <text x="1330" y="750" class="meta">Triage • tone • routing</text>

  <!-- Right: external -->
  <rect x="1640" y="270" width="480" height="130" rx="20" class="side"/>
  <text x="1880" y="318" class="small">GitHub webhooks (trigger)</text>
  <text x="1880" y="358" class="small">External event source</text>

  <rect x="1640" y="450" width="480" height="130" rx="20" class="side"/>
  <text x="1880" y="498" class="small">GitHub repo surfaces</text>
  <text x="1880" y="538" class="small">Read issues/PRs • Write labels/comments</text>

  <rect x="1640" y="630" width="480" height="130" rx="20" class="side"/>
  <text x="1880" y="678" class="small">Signal + blog outputs</text>
  <text x="1880" y="718" class="small">Read feedback • Write updates/files</text>

  <!-- Core hierarchy (clean vertical) -->
  <path d="M1100 390 L1100 440" class="bi"/>
  <path d="M1040 560 L920 660" class="bi"/>
  <path d="M1160 560 L1280 660" class="bi"/>
  <path d="M1090 810 L1110 810" class="bi"/>

  <!-- Left connectors (orthogonal, routed outside text) -->
  <path d="M560 335 L620 335 L620 760 L650 760" class="link"/>
  <path d="M560 515 L600 515 L600 760 L1110 760" class="link"/>
  <path d="M560 695 L580 695 L580 500 L760 500" class="link"/>

  <!-- Right connectors (orthogonal, routed outside text) -->
  <path d="M1640 335 L1560 335 L1560 500 L1440 500" class="link"/>
  <path d="M1640 515 L1600 515 L1600 760 L1550 760" class="link"/>
  <path d="M1640 695 L1580 695 L1580 760 L1550 760" class="link"/>
</svg>